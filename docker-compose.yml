version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: soc-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: soc-platform
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - soc-network

  # Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: soc-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/soc-platform?authSource=admin
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_REFRESH_SECRET=your-super-secret-refresh-key-change-in-production
      - ML_SERVICE_URL=http://ml-service:8000
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      - mongodb
      - ml-service
    networks:
      - soc-network

  # ML Service
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: soc-ml-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MODEL_PATH=/app/trained_models
    volumes:
      - ml_models:/app/trained_models
    networks:
      - soc-network

  # Frontend Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: soc-client
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - REACT_APP_SOCKET_URL=http://localhost:5000
    depends_on:
      - server
    networks:
      - soc-network

networks:
  soc-network:
    driver: bridge

volumes:
  mongodb_data:
  ml_models:
